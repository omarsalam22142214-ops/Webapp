<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيقي الجديد</title>
    
    <link rel="manifest" href="manifest.json">
    
    <meta name="theme-color" content="#317EFB"/>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f4f4f9;
        }
    </style>
</head>
<body>

    <h1>أهلاً بيك في تطبيق الويب بتاعنا!</h1>
    <p>الموقع ده دلوقتي جاهز إنه ينزل كـ Web App من على جيت هاب.</p>

    <script>
        // كود تشغيل الـ Service Worker بمسار نسبي
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                .then(registration => {
                    console.log('الـ Service Worker اشتغل بنجاح:', registration.scope);
                })
                .catch(error => {
                    console.log('فشل تشغيل الـ Service Worker:', error);
                });
            });
        }
    </script>
</body>
</html>
